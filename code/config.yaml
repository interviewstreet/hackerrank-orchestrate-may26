llm:
  model: claude-sonnet-4-5
  temperature: 0.0
  max_tokens_classifier: 400
  max_tokens_reasoner: 1200
embedding:
  provider: local
  model: BAAI/bge-small-en-v1.5
retrieval:
  top_k: 6
  min_score: 0.32
  rrf_constant: 60
  candidate_pool: 30
classification:
  min_confidence: 0.6
escalation:
  sensitive_keywords:
    - identity theft
    - stolen card
    - fraud
    - dispute
    - chargeback
    - subpoena
    - breach
    - vulnerability
    - bug bounty
    - self-harm
    - suicide
  authorization_phrases:
    - restore my access
    - increase my score
    - delete that user
    - make a refund
paths:
  corpus_root: data
  index_dir: code/index
  runs_dir: code/runs
  input_csv: support_tickets/support_tickets.csv
  output_csv: support_tickets/output.csv
